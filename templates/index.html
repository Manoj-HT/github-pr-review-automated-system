<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PR Sentinel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header class="chat-header">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>PR Sentinel</h1>
            </div>
            <p>Automated Code Review Assistant</p>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="message system-message">
                <div class="avatar">S</div>
                <div class="bubble">
                    <p>Welcome! I'm PR Sentinel. Please provide a GitHub Pull Request URL to get started.</p>
                </div>
            </div>
        </main>

        <footer class="chat-input-area">
            <form id="reviewForm">
                <input type="url" id="prUrlInput" placeholder="https://github.com/owner/repo/pull/123" required>
                <input type="text" id="userMessageInput" placeholder="Optional context or instructions...">
                <button type="submit" id="submitBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
